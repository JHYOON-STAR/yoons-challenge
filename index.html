<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="윤패밀리 챌린지">
<title>윤패밀리 챌린지 🏆</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Nunito:wght@700;900&display=swap');
  :root {
    --primary: #4CAF50; --primary-dark: #388E3C; --primary-light: #C8E6C9;
    --gold: #FFD700; --silver: #C0C0C0; --bronze: #CD7F32;
    --bg: #F1F8E9; --card: #FFFFFF; --text: #1B5E20; --text-muted: #558B2F;
    --border: #DCEDC8; --shadow: 0 2px 12px rgba(76,175,80,0.12); --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }
  .header { background: linear-gradient(135deg, #2E7D32, #43A047); color: white; padding: 20px 16px 16px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .header h1 { font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 900; }
  .header .date { font-size: 13px; opacity: 0.85; margin-top: 2px; }
  .tabs { display: flex; background: white; border-bottom: 2px solid var(--border); position: sticky; top: 70px; z-index: 99; }
  .tab { flex: 1; padding: 12px 4px; text-align: center; font-size: 12px; font-weight: 700; color: #999; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
  .tab.active { color: var(--primary-dark); border-bottom-color: var(--primary); }
  .tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }
  .screen { display: none; padding: 16px; }
  .screen.active { display: block; }
  .member-selector { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .member-selector h3 { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }
  .member-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .member-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 14px; border-radius: 12px; border: 2px solid var(--border); background: white; cursor: pointer; transition: all 0.2s; font-size: 12px; font-weight: 700; color: var(--text-muted); }
  .member-btn .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .member-btn.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary-dark); }
  .mission-card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .mission-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .score-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .score-text { font-family: 'Nunito', sans-serif; font-size: 28px; font-weight: 900; color: var(--primary-dark); }
  .score-max { font-size: 14px; color: var(--text-muted); }
  .progress-bar { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #8BC34A); border-radius: 4px; transition: width 0.4s ease; }
  .mission-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .mission-item:last-child { border-bottom: none; }
  .mission-item:active { background: var(--bg); border-radius: 8px; }
  .mission-emoji { font-size: 24px; width: 36px; text-align: center; }
  .mission-info { flex: 1; }
  .mission-name { font-size: 14px; font-weight: 700; }
  .mission-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .mission-check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.2s; flex-shrink: 0; }
  .mission-check.done { background: var(--primary); border-color: var(--primary); color: white; }
  .ranking-card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; }
  .rank-num { font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 900; width: 32px; text-align: center; }
  .rank-1 { color: var(--gold); } .rank-2 { color: var(--silver); } .rank-3 { color: var(--bronze); } .rank-other { color: #ccc; }
  .rank-avatar { font-size: 32px; }
  .rank-info { flex: 1; }
  .rank-name { font-size: 15px; font-weight: 700; }
  .rank-score-text { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .rank-score { font-family: 'Nunito', sans-serif; font-size: 24px; font-weight: 900; color: var(--primary-dark); }
  .rank-unit { font-size: 12px; color: var(--text-muted); }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .stat-card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); text-align: center; }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .stat-value { font-family: 'Nunito', sans-serif; font-size: 28px; font-weight: 900; color: var(--primary-dark); }
  .stat-unit { font-size: 13px; color: var(--text-muted); }
  .week-chart { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .week-chart h3 { font-size: 14px; font-weight: 700; margin-bottom: 16px; }
  .chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 100px; }
  .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
  .chart-bar { width: 100%; border-radius: 6px 6px 0 0; min-height: 4px; }
  .chart-bar.today { background: var(--primary); } .chart-bar.past { background: var(--primary-light); } .chart-bar.future { background: var(--border); }
  .chart-day { font-size: 11px; color: var(--text-muted); font-weight: 700; }
  .chart-score { font-size: 10px; color: var(--text-muted); }
  .reward-card { background: linear-gradient(135deg, #FFF8E1, #FFF3E0); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 2px solid #FFE082; box-shadow: var(--shadow); }
  .reward-title { font-size: 14px; font-weight: 700; color: #E65100; margin-bottom: 4px; }
  .reward-desc { font-size: 13px; color: #BF360C; }
  .section-title { font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .cheer-box { background: linear-gradient(135deg, #E8F5E9, #F1F8E9); border-radius: 12px; padding: 12px 16px; margin-top: 12px; border-left: 4px solid var(--primary); font-size: 13px; color: var(--text); font-weight: 500; }
  .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 700; opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; background: var(--card); border-radius: var(--radius); padding: 10px 14px; box-shadow: var(--shadow); }
  .week-nav-btn { background: var(--primary-light); border: none; border-radius: 8px; padding: 6px 14px; font-size: 14px; font-weight: 700; color: var(--primary-dark); cursor: pointer; }
  .week-nav-btn:disabled { opacity: 0.3; cursor: default; }
  .week-nav-info { text-align: center; }
  .week-nav-label { font-size: 14px; font-weight: 700; color: var(--text); }
  .week-nav-range { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .consolation-box { background: linear-gradient(135deg, #FFF8E1, #FFF3E0); border: 2px solid #FFE082; border-radius: var(--radius); padding: 16px; margin-top: 12px; text-align: center; }
  .consolation-box.none { background: var(--bg); border: 1px solid var(--border); }
</style>
</head>
<body>

<div class="header">
  <h1>🏆 윤패밀리 챌린지</h1>
  <div class="date" id="headerDate"></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('home')"><span class="tab-icon">🏠</span>오늘</div>
  <div class="tab" onclick="showTab('ranking')"><span class="tab-icon">🏅</span>랭킹</div>
  <div class="tab" onclick="showTab('stats')"><span class="tab-icon">📊</span>통계</div>
  <div class="tab" onclick="showTab('reward')"><span class="tab-icon">🎁</span>보상</div>
</div>

<!-- 오늘 탭 -->
<div class="screen active" id="screen-home">
  <div class="member-selector">
    <h3>👤 나는 누구?</h3>
    <div class="member-btns" id="memberBtns"></div>
  </div>
  <div id="missionArea">
    <div class="loading"><div class="spinner"></div>멤버를 선택해주세요</div>
  </div>
</div>

<!-- 랭킹 탭 -->
<div class="screen" id="screen-ranking">
  <div class="week-nav">
    <button class="week-nav-btn" id="prevWeekBtn" onclick="changeWeek(-1)">◀ 이전</button>
    <div class="week-nav-info">
      <div class="week-nav-label" id="weekLabel">이번 주</div>
      <div class="week-nav-range" id="weekRange"></div>
    </div>
    <button class="week-nav-btn" id="nextWeekBtn" onclick="changeWeek(1)" disabled>다음 ▶</button>
  </div>
  <div class="section-title">🏆 가족 랭킹</div>
  <div id="rankingList"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div>
  <div id="consolationBox"></div>
  <div class="section-title" style="margin-top:20px" id="todayTitle">📅 오늘 현황</div>
  <div id="todayRanking"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div>
</div>

<!-- 통계 탭 -->
<div class="screen" id="screen-stats">
  <div class="member-selector">
    <h3>👤 멤버 선택</h3>
    <div class="member-btns" id="statsMemberBtns"></div>
  </div>
  <div id="statsArea"><div class="loading">멤버를 선택해주세요</div></div>
</div>

<!-- 보상 탭 -->
<div class="screen" id="screen-reward">
  <div class="section-title">🎯 보상 기준</div>
  <div class="reward-card"><div class="reward-title">🥉 주간 80점 이상</div><div class="reward-desc">💵 3만원</div></div>
  <div class="reward-card"><div class="reward-title">🥈 주간 100점 이상</div><div class="reward-desc">💵 5만원</div></div>
  <div class="reward-card"><div class="reward-title">🥇 주간 120점 이상</div><div class="reward-desc">💵 10만원</div></div>
  <div class="reward-card" style="background:linear-gradient(135deg,#E3F2FD,#E8F5E9);border-color:#90CAF9;">
    <div class="reward-title" style="color:#1565C0">🎖️ 위로 보상</div>
    <div class="reward-desc" style="color:#0D47A1">아무도 80점 미달 + 1등이 70점 이상이면<br>1등에게 💵 3만원</div>
  </div>

  <div class="section-title" style="margin-top:20px">📈 이번 주 내 진행상황</div>
  <div class="member-selector" style="margin-bottom:12px">
    <h3>👤 멤버 선택</h3>
    <div class="member-btns" id="rewardMemberBtns"></div>
  </div>
  <div id="rewardProgress"><div class="loading">멤버를 선택해주세요</div></div>
</div>

<div class="toast" id="toast"></div>
<div style="text-align:center;padding:12px;font-size:11px;color:#aaa;">윤패밀리 챌린지 v1.6 · 2026.05.20</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyD-auubMQi2c0QQKwTjL9z03uzZmuifHCU",
  authDomain: "yoons-health-challenge.firebaseapp.com",
  projectId: "yoons-health-challenge",
  storageBucket: "yoons-health-challenge.firebasestorage.app",
  messagingSenderId: "301530979728",
  appId: "1:301530979728:web:3f7ff77bb2ed423223e715",
  measurementId: "G-RJHW3GP11S"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ========== 앱 데이터 ==========
const MEMBERS = [
  { id: 'dad',      name: '아빠',   emoji: '👨' },
  { id: 'mom',      name: '엄마',   emoji: '👩' },
  { id: 'happy',    name: '해피',   emoji: '🐶' },
  { id: 'princess', name: '공주님', emoji: '👸' },
  { id: 'son',      name: '아들',   emoji: '👦' },
];

const MISSIONS = [
  { id: 'wake',       name: '기상 시간 지키기', emoji: '⏰', desc: '평일 7~8시 / 주말 8~9시 (±30분 인정)', points: 2 },
  { id: 'water',      name: '물 1.5L 마시기',   emoji: '💧', desc: '하루 물 1.5리터 채우기',               points: 3 },
  { id: 'exercise',   name: '운동 30분 이상',    emoji: '🏃', desc: '걷기, 운동 등 30분 이상',              points: 3 },
  { id: 'meals',      name: '세끼 챙겨먹기',     emoji: '🍱', desc: '아침·점심·저녁 모두 챙기기',           points: 2 },
  { id: 'nosnack',    name: '야식 안 먹기',      emoji: '🚫', desc: '저녁 식사 후 야식 금지',               points: 1 },
  { id: 'sleep',      name: '자정 이전 취침',    emoji: '🌙', desc: '자정 12시 전에 잠들기',                points: 2 },
  { id: 'nonap',      name: '낮잠 안자기',       emoji: '☀️', desc: '낮잠 1시간 이내 가능',                 points: 2 },
  { id: 'room',       name: '방 정리',           emoji: '🧹', desc: '하루 한 번 방 깔끔하게 정리',          points: 4 },
  { id: 'nodelivery', name: '배달 음식 안먹기',  emoji: '🛵', desc: '배달 음식 시키지 않기',                points: 1 },
  { id: 'nosnacks',   name: '간식(과자) 안먹기', emoji: '🍪', desc: '과자 등 간식 먹지 않기',               points: 1 },
];

const MAX_DAILY = MISSIONS.reduce((s, m) => s + m.points, 0); // 21점
const CHEERS = ['오늘도 건강한 하루! 💪','가족과 함께라면 할 수 있어요! 🌟','작은 습관이 큰 변화를 만들어요! 🌱','윤패밀리 파이팅! 🏆','건강이 최고의 재산! 💎'];

// ========== 상태 ==========
let currentMember = null;
let statsMember = null;
let rewardMember = null;
let todayChecks = {};
let weekOffset = 0; // 0=이번주, -1=지난주

const today = new Date();
const todayStr = today.toISOString().slice(0, 10);

function getWeekStartDate(offsetWeeks = 0) {
  const d = new Date(today);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff + offsetWeeks * 7);
  d.setHours(0,0,0,0);
  return d;
}

function formatDateKR(d) {
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function formatDate(d) {
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${['일','월','화','수','목','금','토'][d.getDay()]})`;
}
document.getElementById('headerDate').textContent = formatDate(today);

// ========== Firebase ==========
async function getChecks(memberId, dateStr) {
  try {
    const ref = doc(db, 'checks', `${memberId}_${dateStr}`);
    const snap = await getDoc(ref);
    return snap.exists() ? (snap.data().missions || {}) : {};
  } catch(e) { return {}; }
}

async function saveChecks(memberId, dateStr, missions) {
  const ref = doc(db, 'checks', `${memberId}_${dateStr}`);
  await setDoc(ref, { memberId, date: dateStr, missions, updatedAt: new Date().toISOString() }, { merge: true });
}

async function getWeekData(memberId, offsetWeeks = 0) {
  const start = getWeekStartDate(offsetWeeks);
  let total = 0, daysElapsed = 0;
  const dailyScores = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const dateStr = d.toISOString().slice(0, 10);
    const isFuture = dateStr > todayStr;
    let score = 0;
    if (!isFuture) {
      const checks = await getChecks(memberId, dateStr);
      score = Object.values(checks).filter(Boolean).length > 0
        ? MISSIONS.filter(m => checks[m.id]).reduce((s, m) => s + m.points, 0) : 0;
      daysElapsed++;
      total += score;
    }
    dailyScores.push({ dateStr, score, isFuture, isToday: dateStr === todayStr });
  }
  const maxPossible = daysElapsed * MAX_DAILY;
  const pct = maxPossible > 0 ? Math.round(total / maxPossible * 100) : 0;
  return { score: total, pct, daysElapsed, maxPossible, dailyScores };
}

function calcScore(checks) {
  return MISSIONS.filter(m => checks[m.id]).reduce((s, m) => s + m.points, 0);
}

// ========== 멤버 버튼 ==========
function renderMemberBtns(containerId, onSelect, selectedId) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  MEMBERS.forEach(m => {
    const btn = document.createElement('div');
    btn.className = 'member-btn' + (selectedId === m.id ? ' selected' : '');
    btn.innerHTML = `<div class="avatar">${m.emoji}</div><span>${m.name}</span>`;
    btn.onclick = () => onSelect(m);
    container.appendChild(btn);
  });
}

// ========== 오늘 미션 ==========
async function selectMember(member) {
  currentMember = member;
  renderMemberBtns('memberBtns', selectMember, member.id);
  localStorage.setItem('lastMember', member.id);
  const area = document.getElementById('missionArea');
  area.innerHTML = '<div class="loading"><div class="spinner"></div>미션 불러오는 중...</div>';
  todayChecks = await getChecks(member.id, todayStr);
  renderMissions();
}

function renderMissions() {
  const score = calcScore(todayChecks);
  const pct = Math.round(score / MAX_DAILY * 100);
  const cheer = CHEERS[Math.floor(Math.random() * CHEERS.length)];
  const area = document.getElementById('missionArea');
  area.innerHTML = `
    <div class="mission-card">
      <h3>${currentMember.emoji} ${currentMember.name}의 오늘 미션</h3>
      <div class="score-bar">
        <div><span class="score-text">${score}</span><span class="score-max"> / ${MAX_DAILY}점</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      ${MISSIONS.map(m => `
        <div class="mission-item" onclick="toggleMission('${m.id}')">
          <div class="mission-emoji">${m.emoji}</div>
          <div class="mission-info">
            <div class="mission-name">${m.name}</div>
            <div class="mission-desc">${m.desc} (+${m.points}점)</div>
          </div>
          <div class="mission-check ${todayChecks[m.id] ? 'done' : ''}" id="check_${m.id}">${todayChecks[m.id] ? '✓' : ''}</div>
        </div>
      `).join('')}
      <div class="cheer-box">${cheer}</div>
      <div style="margin-top:10px;font-size:11px;color:var(--text-muted);text-align:center">🔒 오늘(${todayStr})만 체크 가능 · 지난 날 수정 불가</div>
    </div>`;
}

window.toggleMission = async function(missionId) {
  if (!currentMember) return;
  const realToday = new Date().toISOString().slice(0, 10);
  if (realToday !== todayStr) { showToast('🔒 날짜가 바뀌었어요! 새로고침 해주세요.'); return; }
  todayChecks[missionId] = !todayChecks[missionId];
  const checkEl = document.getElementById('check_' + missionId);
  if (checkEl) { checkEl.className = 'mission-check' + (todayChecks[missionId] ? ' done' : ''); checkEl.textContent = todayChecks[missionId] ? '✓' : ''; }
  const score = calcScore(todayChecks);
  const scoreEl = document.querySelector('.score-text');
  const fillEl = document.querySelector('.progress-fill');
  if (scoreEl) scoreEl.textContent = score;
  if (fillEl) fillEl.style.width = Math.round(score / MAX_DAILY * 100) + '%';
  try {
    await saveChecks(currentMember.id, todayStr, todayChecks);
    showToast(todayChecks[missionId] ? '✅ 완료!' : '↩️ 취소됨');
  } catch(e) { showToast('⚠️ 저장 실패. 인터넷을 확인해주세요.'); }
};

// ========== 랭킹 ==========
window.changeWeek = function(dir) {
  const newOffset = weekOffset + dir;
  if (newOffset > 0) return;
  weekOffset = newOffset;
  loadRanking();
};

async function loadRanking() {
  const rankEl = document.getElementById('rankingList');
  rankEl.innerHTML = '<div class="loading"><div class="spinner"></div>계산 중...</div>';
  document.getElementById('consolationBox').innerHTML = '';

  // 주차 네비 업데이트
  const wStart = getWeekStartDate(weekOffset);
  const wEnd = new Date(wStart); wEnd.setDate(wStart.getDate() + 6);
  const isCurrentWeek = weekOffset === 0;
  document.getElementById('weekLabel').textContent = isCurrentWeek ? '이번 주' : weekOffset === -1 ? '지난 주' : `${Math.abs(weekOffset)}주 전`;
  document.getElementById('weekRange').textContent = `${formatDateKR(wStart)} ~ ${formatDateKR(wEnd)}`;
  document.getElementById('nextWeekBtn').disabled = isCurrentWeek;
  document.getElementById('todayTitle').textContent = isCurrentWeek ? '📅 오늘 현황' : `📅 ${formatDateKR(wEnd)} (일) 최종 현황`;

  // 주간 랭킹
  const rankColors = ['rank-1','rank-2','rank-3','rank-other','rank-other'];
  const medals = ['🥇','🥈','🥉','4','5'];

  const weekScores = await Promise.all(
    MEMBERS.map(async m => { const w = await getWeekData(m.id, weekOffset); return { ...m, ...w }; })
  );
  weekScores.sort((a, b) => b.pct - a.pct || b.score - a.score);

  rankEl.innerHTML = weekScores.map((m, i) => `
    <div class="ranking-card">
      <div class="rank-num ${rankColors[i]}">${medals[i]}</div>
      <div class="rank-avatar">${m.emoji}</div>
      <div class="rank-info">
        <div class="rank-name">${m.name}</div>
        <div style="margin-top:4px;background:var(--border);border-radius:4px;height:5px;width:90px;overflow:hidden">
          <div style="height:100%;width:${m.pct}%;background:linear-gradient(90deg,var(--primary),#8BC34A);border-radius:4px"></div>
        </div>
        <div class="rank-score-text" style="margin-top:3px">${m.score}점 / ${m.maxPossible}점 (${m.daysElapsed}일 기준)</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;color:var(--primary-dark)">${m.pct}%</div>
        <div style="font-size:11px;color:var(--text-muted)">달성률</div>
      </div>
    </div>
  `).join('');

  // 위로 보상 조건
  const top = weekScores[0];
  const allUnder80 = weekScores.every(m => m.score < 80);
  const consolBox = document.getElementById('consolationBox');
  if (allUnder80 && top.score >= 70) {
    consolBox.innerHTML = `
      <div class="consolation-box">
        <div style="font-size:24px;margin-bottom:6px">🎖️</div>
        <div style="font-weight:700;font-size:15px;color:#E65100;margin-bottom:6px">위로 보상 해당!</div>
        <div style="font-size:13px;color:#BF360C">아무도 80점을 못 넘었지만<br><strong>${top.name}</strong>이(가) 1등(${top.score}점)으로 열심히 했어요!<br><br>💵 위로 3만원 보상!</div>
      </div>`;
  } else if (allUnder80 && top.score < 70) {
    consolBox.innerHTML = `<div class="consolation-box none"><div style="font-size:13px;color:var(--text-muted)">😅 이번 주는 모두 아쉬웠어요...<br>다음 주엔 다 같이 힘내봐요!</div></div>`;
  } else {
    consolBox.innerHTML = `<div class="consolation-box none"><div style="font-size:13px;color:var(--text-muted)">✅ 보상 달성자가 있어요! 위로 보상 해당 없음</div></div>`;
  }

  // 오늘/마지막날 현황
  const todayEl = document.getElementById('todayRanking');
  const checkDate = isCurrentWeek ? todayStr : wEnd.toISOString().slice(0,10);
  const todayScores = await Promise.all(
    MEMBERS.map(async m => {
      const checks = await getChecks(m.id, checkDate);
      return { ...m, score: calcScore(checks), done: Object.values(checks).filter(Boolean).length };
    })
  );
  todayScores.sort((a, b) => b.score - a.score);
  todayEl.innerHTML = todayScores.map((m, i) => `
    <div class="ranking-card">
      <div class="rank-num ${rankColors[i]}">${i < 3 ? medals[i] : i+1}</div>
      <div class="rank-avatar">${m.emoji}</div>
      <div class="rank-info">
        <div class="rank-name">${m.name}</div>
        <div class="rank-score-text">${m.done}개 완료</div>
      </div>
      <div><span class="rank-score">${m.score}</span><span class="rank-unit">점</span></div>
    </div>
  `).join('');
}

// ========== 통계 ==========
async function selectStatsMember(member) {
  statsMember = member;
  renderMemberBtns('statsMemberBtns', selectStatsMember, member.id);
  const area = document.getElementById('statsArea');
  area.innerHTML = '<div class="loading"><div class="spinner"></div>통계 불러오는 중...</div>';
  const { score: weekScore, dailyScores, daysElapsed } = await getWeekData(member.id, 0);
  const avgScore = daysElapsed > 0 ? Math.round(weekScore / daysElapsed) : 0;
  const days = ['월','화','수','목','금','토','일'];
  area.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">이번 주 합계</div><div class="stat-value">${weekScore}<span class="stat-unit">점</span></div></div>
      <div class="stat-card"><div class="stat-label">하루 평균</div><div class="stat-value">${avgScore}<span class="stat-unit">점</span></div></div>
    </div>
    <div class="week-chart">
      <h3>${member.emoji} ${member.name}의 이번 주</h3>
      <div class="chart-bars">
        ${dailyScores.map((d, i) => `
          <div class="chart-bar-wrap">
            <div class="chart-score">${d.isFuture ? '' : d.score}</div>
            <div class="chart-bar ${d.isToday ? 'today' : d.isFuture ? 'future' : 'past'}" style="height:${d.isFuture ? 4 : Math.round(d.score / MAX_DAILY * 90)}px"></div>
            <div class="chart-day">${days[i]}</div>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="mission-card">
      <h3>📋 미션별 이번 주 달성률</h3>
      ${await renderMissionStats(member.id)}
    </div>`;
}

async function renderMissionStats(memberId) {
  const start = getWeekStartDate(0);
  const missionCounts = {};
  MISSIONS.forEach(m => missionCounts[m.id] = 0);
  let daysCount = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(start); d.setDate(start.getDate() + i);
    const dateStr = d.toISOString().slice(0, 10);
    if (dateStr > todayStr) break;
    daysCount++;
    const checks = await getChecks(memberId, dateStr);
    MISSIONS.forEach(m => { if (checks[m.id]) missionCounts[m.id]++; });
  }
  return MISSIONS.map(m => {
    const pct = daysCount > 0 ? Math.round(missionCounts[m.id] / daysCount * 100) : 0;
    return `
      <div class="mission-item" style="cursor:default">
        <div class="mission-emoji">${m.emoji}</div>
        <div class="mission-info">
          <div class="mission-name">${m.name}</div>
          <div class="mission-desc">${missionCounts[m.id]}/${daysCount}일 완료</div>
        </div>
        <div style="text-align:right;min-width:44px"><div style="font-weight:700;font-size:14px;color:var(--primary-dark)">${pct}%</div></div>
      </div>`;
  }).join('');
}

// ========== 보상 ==========
async function selectRewardMember(member) {
  rewardMember = member;
  renderMemberBtns('rewardMemberBtns', selectRewardMember, member.id);
  const area = document.getElementById('rewardProgress');
  area.innerHTML = '<div class="loading"><div class="spinner"></div>불러오는 중...</div>';
  const { score: weekScore, pct: weekPct, daysElapsed, maxPossible } = await getWeekData(member.id, 0);

  area.innerHTML = `
    <div class="mission-card">
      <h3>${member.emoji} ${member.name}의 이번 주 현황</h3>
      <div class="score-bar">
        <div><span class="score-text">${weekScore}</span><span class="score-max"> / ${maxPossible}점 (${daysElapsed}일 기준)</span></div>
      </div>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:12px">달성률 <strong style="color:var(--primary-dark);font-size:16px">${weekPct}%</strong></div>
      <div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:4px">
          <span>🥉 3만원 (80점)</span>
          <span>${weekScore>=80?'✅ 달성!':Math.max(0,80-weekScore)+'점 남음'}</span>
        </div>
        <div class="progress-bar" style="margin-bottom:10px">
          <div class="progress-fill" style="width:${Math.min(100,Math.round(weekScore/80*100))}%;background:${weekScore>=80?'var(--primary)':'#FFA726'}"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:4px">
          <span>🥈 5만원 (100점)</span>
          <span>${weekScore>=100?'✅ 달성!':Math.max(0,100-weekScore)+'점 남음'}</span>
        </div>
        <div class="progress-bar" style="margin-bottom:10px">
          <div class="progress-fill" style="width:${Math.min(100,Math.round(weekScore/100*100))}%;background:${weekScore>=100?'var(--primary)':'#FFA726'}"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:4px">
          <span>🥇 10만원 (120점)</span>
          <span>${weekScore>=120?'✅ 달성!':Math.max(0,120-weekScore)+'점 남음'}</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${Math.min(100,Math.round(weekScore/120*100))}%"></div>
        </div>
      </div>
      ${weekScore>=80&&weekScore<100?'<div class="cheer-box">🎉 3만원 보상 달성! 대단해요!</div>':''}
      ${weekScore>=100&&weekScore<120?'<div class="cheer-box">🎊 5만원 보상 달성! 최고예요!</div>':''}
      ${weekScore>=120?'<div class="cheer-box">🏆 10만원 보상 달성! 완벽한 한 주예요!</div>':''}
    </div>`;
}

// ========== 탭 전환 ==========
window.showTab = function(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.querySelectorAll('.tab')[['home','ranking','stats','reward'].indexOf(tab)].classList.add('active');
  if (tab === 'ranking') loadRanking();
  if (tab === 'stats') { renderMemberBtns('statsMemberBtns', selectStatsMember, statsMember?.id); if (statsMember) selectStatsMember(statsMember); }
  if (tab === 'reward') { renderMemberBtns('rewardMemberBtns', selectRewardMember, rewardMember?.id); if (rewardMember) selectRewardMember(rewardMember); }
};

// ========== 토스트 ==========
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ========== 초기화 ==========
renderMemberBtns('memberBtns', selectMember, null);
renderMemberBtns('rewardMemberBtns', selectRewardMember, null);
const lastMemberId = localStorage.getItem('lastMember');
if (lastMemberId) { const m = MEMBERS.find(m => m.id === lastMemberId); if (m) selectMember(m); }
</script>
